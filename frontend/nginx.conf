# Reviewer 前端 nginx 配置：静态托管 + /api 反代（含 SSE 支持）。
#
# 反代目标 api:8100 为 docker-compose 中 API 服务的名称与端口；
# SSE 端点（GET /api/analysis/{sid}/events）需要关闭代理缓冲并允许长连接，
# 否则事件会被 nginx 缓冲、无法逐帧实时推送到浏览器。

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA 前端路由：找不到文件时回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 与 SSE 反代到 API 进程
    location /api/ {
        proxy_pass http://api:8100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ---- SSE 关键配置 ----
        # 关闭响应缓冲，事件逐帧透传
        proxy_buffering off;
        proxy_cache off;
        # 保持长连接（清空 Connection 头，避免 keepalive 被关闭）
        proxy_set_header Connection "";
        # SSE 流可能长时间无数据（心跳间隔 15s），放宽读超时
        proxy_read_timeout 3600s;
    }
}
